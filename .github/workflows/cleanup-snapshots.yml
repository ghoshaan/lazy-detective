name: cleanup-snapshots

on:
  schedule:
    - cron: '0 3 * * 0'  # every Sunday at 3am UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Delete snapshots older than 7 days
        run: |
          CUTOFF=$(date -d '21 days ago' +%s)
          DELETED=0

          for meta in snapshots/*/meta.json; do
            [ -f "$meta" ] || continue
            dir=$(dirname "$meta")
            created=$(jq -r '.createdAt // empty' "$meta")
            [ -z "$created" ] && continue
            ts=$(date -d "$created" +%s 2>/dev/null) || continue
            if [ "$ts" -lt "$CUTOFF" ]; then
              rm -rf "$dir"
              echo "Deleted $dir (created $created)"
              DELETED=$((DELETED + 1))
            fi
          done

          echo "Removed $DELETED snapshot(s)"
          echo "deleted=$DELETED" >> "$GITHUB_OUTPUT"
        id: cleanup

      - name: Commit deletions
        if: steps.cleanup.outputs.deleted != '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A snapshots/
          git commit -m "chore: remove snapshots older than 7 days"
          git push
